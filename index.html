<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TempSMS - Real API</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --text: #2b2b2b; --text-light: #6c757d;
            --primary: #4361ee; --border: #e9ecef; --success: #10b981; --radius: 16px;
        }
        [data-theme="dark"] {
            --bg: #121212; --surface: #1e1e1e; --text: #f8f9fa; --text-light: #adb5bd;
            --primary: #4cc9f0; --border: #2b2b2b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }

        header { background: var(--surface); padding: 20px 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); }
        .theme-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 500;}

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .number-card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; cursor: pointer; }
        .number-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .num-info { display: flex; align-items: center; gap: 15px; }
        .flag { font-size: 30px; }
        .num-text h3 { font-size: 20px; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }

        /* Inbox */
        .inbox { display: none; background: var(--surface); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border); }
        .inbox-header { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; align-items: center;}
        
        .loader { display: none; text-align: center; padding: 30px; color: var(--primary); font-weight: 600; }
        .loader-spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .msg-box { background: var(--bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--primary); animation: slideUp 0.3s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-top { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; color: var(--text-light); }
        .sender { font-weight: 600; color: var(--text); font-size: 15px; }
        .msg-text { font-size: 14px; margin-top: 5px; }
        .error-msg { color: #ef4444; text-align: center; padding: 20px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; font-weight: 500;}

        @media(max-width: 600px) {
            .number-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">💬 Real TempSMS</div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    </header>

    <div class="container">
        <div id="numbersView">
            <h2>Select a Public Number</h2>
            <p style="color: var(--text-light); margin-bottom: 20px;">Fetching real data via Proxy API.</p>
            <div id="list"></div>
        </div>

        <div class="inbox" id="inboxView">
            <div class="inbox-header">
                <button class="btn" style="background: var(--bg); color: var(--text); border: 1px solid var(--border);" onclick="goBack()">← Back</button>
                <h3 id="activeNumber">Number</h3>
                <button class="btn" onclick="fetchRealSMS(currentNumberClean)">🔄 Refresh</button>
            </div>
            
            <div class="loader" id="loader">
                <div class="loader-spinner"></div>
                <p>Fetching live SMS from network...</p>
            </div>
            <div id="messagesArea"></div>
        </div>
    </div>

    <script>
        const numbers = [
            { flag: '🇺🇸', num: '+1 201 500 0111', clean: '12015000111' },
            { flag: '🇬🇧', num: '+44 748 888 2321', clean: '447488882321' },
            { flag: '🇫🇷', num: '+33 757 130 111', clean: '33757130111' },
            { flag: '🇸🇪', num: '+46 76 943 60 11', clean: '46769436011' }
        ];

        let currentNumberClean = '';

        if(localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '☀️ Light Mode';
        }

        const listDiv = document.getElementById('list');
        numbers.forEach(item => {
            listDiv.innerHTML += `
                <div class="number-card" onclick="openInbox('${item.flag}', '${item.num}', '${item.clean}')">
                    <div class="num-info">
                        <div class="flag">${item.flag}</div>
                        <div class="num-text"><h3>${item.num}</h3></div>
                    </div>
                    <button class="btn">View Real SMS</button>
                </div>
            `;
        });

        function toggleTheme() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeBtn').innerText = '🌙 Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeBtn').innerText = '☀️ Light Mode';
            }
        }

        function openInbox(flag, num, cleanNum) {
            document.getElementById('numbersView').style.display = 'none';
            document.getElementById('inboxView').style.display = 'block';
            document.getElementById('activeNumber').innerText = `${flag} ${num}`;
            currentNumberClean = cleanNum;
            fetchRealSMS(cleanNum);
        }

        function goBack() {
            document.getElementById('inboxView').style.display = 'none';
            document.getElementById('numbersView').style.display = 'block';
        }

        // --- NAYA API FETCH LOGIC (corsproxy.io) ---
        async function fetchRealSMS(cleanNum) {
            const msgArea = document.getElementById('messagesArea');
            const loader = document.getElementById('loader');
            
            msgArea.innerHTML = '';
            loader.style.display = 'block';

            try {
                // Target website
                const targetUrl = `https://receive-smss.com/sms/${cleanNum}/`;
                // Naya Proxy
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error("Proxy Blocked");
                
                const textData = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(textData, "text/html");

                const rows = doc.querySelectorAll('.message-row');
                loader.style.display = 'none';

                if(rows.length === 0) {
                    msgArea.innerHTML = `<div class="error-msg">❌ Koi naya message nahi mila ya Target Site ne block kar diya hai.</div>`;
                    return;
                }

                rows.forEach(row => {
                    const sender = row.querySelector('.sender-column')?.innerText.trim() || 'Unknown';
                    const text = row.querySelector('.message-text-column')?.innerText.trim() || 'No Text';
                    const time = row.querySelector('.time-column')?.innerText.trim() || 'Just now';

                    msgArea.innerHTML += `
                        <div class="msg-box">
                            <div class="msg-top">
                                <span class="sender">${sender}</span>
                                <span>${time}</span>
                            </div>
                            <div class="msg-text">${text}</div>
                        </div>
                    `;
                });

            } catch (error) {
                loader.style.display = 'none';
                msgArea.innerHTML = `<div class="error-msg">⚠️ Failed to connect. Free Proxy block ho gayi hai. Is problem ko hamesha ke liye theek karne ke liye Backend Server (Node.js) zaroori hai.</div>`;
                console.error(error);
            }
        }
    </script>
</body>
</html>
