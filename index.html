<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth Temp SMS - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6; --bg: #0f172a; --card: #1e293b;
            --text: #f8fafc; --text-dim: #94a3b8; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .logo { font-size: 32px; font-weight: 700; color: var(--primary); letter-spacing: -1px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); padding: 25px; 
            border-radius: 16px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2); }
        .card h3 { font-size: 14px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 22px; font-weight: 600; }

        .inbox { display: none; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-back { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: 600; }
        .btn-back:hover { background: var(--primary); color: white; }

        .loader { text-align: center; padding: 40px; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .msg { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .msg-meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; font-weight: 600; color: var(--primary); }
        .msg-body { font-size: 15px; color: var(--text); }
        
        .error-box { 
            background: rgba(239, 68, 68, 0.1); border: 1px dashed #ef4444; 
            color: #fca5a5; padding: 20px; border-radius: 12px; text-align: center; 
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">🚀 Stealth SMS Pro</div>
        <p style="color: var(--text-dim)">Advanced Multi-Proxy Live SMS Scraper</p>
    </header>

    <div id="mainGrid" class="grid">
        <div class="card" onclick="openInbox('+91 91234 56789', '919123456789')">
            <h3>🇮🇳 India</h3>
            <p>+91 91234 56789</p>
        </div>
        <div class="card" onclick="openInbox('+92 300 1234567', '923001234567')">
            <h3>🇵🇰 Pakistan</h3>
            <p>+92 300 1234567</p>
        </div>
        <div class="card" onclick="openInbox('+1 201 500 0111', '12015000111')">
            <h3>🇺🇸 USA</h3>
            <p>+1 201 500 0111</p>
        </div>
    </div>

    <div id="inboxView" class="inbox">
        <button class="btn-back" onclick="showMain()">← Back to Numbers</button>
        <h2 id="activeNum" style="margin-bottom: 25px;"></h2>
        
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p id="status">Connecting to Secure Tunnel...</p>
        </div>

        <div id="messageList"></div>
    </div>
</div>

<script>
    const proxies = [
        (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`,
        (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        (url) => `https://thingproxy.freeboard.io/fetch/${url}`
    ];

    function showMain() {
        document.getElementById('inboxView').style.display = 'none';
        document.getElementById('mainGrid').style.display = 'grid';
    }

    async function openInbox(displayNum, cleanNum) {
        document.getElementById('mainGrid').style.display = 'none';
        const inbox = document.getElementById('inboxView');
        inbox.style.display = 'block';
        document.getElementById('activeNum').innerText = "Inbox: " + displayNum;
        
        await fetchSMS(cleanNum);
    }

    async function fetchSMS(id) {
        const list = document.getElementById('messageList');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        
        list.innerHTML = '';
        loader.style.display = 'block';

        const target = `https://receive-smss.com/sms/${id}/`;
        let success = false;

        // Multi-Proxy Attempt Logic
        for (let i = 0; i < proxies.length; i++) {
            try {
                status.innerText = `Trying Proxy Route ${i + 1}...`;
                const response = await fetch(proxies[i](target));
                
                if (!response.ok) throw new Error();

                let html;
                if (i === 0) { // AllOrigins returns JSON
                    const data = await response.json();
                    html = data.contents;
                } else {
                    html = await response.text();
                }

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, "text/html");
                const rows = doc.querySelectorAll('.message-row');

                if (rows.length > 0) {
                    loader.style.display = 'none';
                    rows.forEach(row => {
                        const sender = row.querySelector('.sender-column')?.innerText.trim() || "Unknown";
                        const text = row.querySelector('.message-text-column')?.innerText.trim() || "No content";
                        const time = row.querySelector('.time-column')?.innerText.trim() || "Recent";

                        list.innerHTML += `
                            <div class="msg">
                                <div class="msg-meta"><span>${sender}</span><span>${time}</span></div>
                                <div class="msg-body">${text}</div>
                            </div>
                        `;
                    });
                    success = true;
                    break; 
                }
            } catch (e) {
                console.log(`Route ${i+1} blocked.`);
            }
        }

        if (!success) {
            loader.style.display = 'none';
            list.innerHTML = `
                <div class="error-box">
                    <h3>🛑 Security Bypass Failed</h3>
                    <p style="margin-top:10px; font-size:14px;">
                        Target site detected the proxy. Is problem ko hamesha ke liye theek karne ke liye **Backend Server (Node.js)** zaroori hai.
                    </p>
                    <button class="btn-back" style="margin-top:15px;" onclick="location.reload()">Try Again</button>
                </div>
            `;
        }
    }
</script>

</body>
</html>
