<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Temp SMS - One Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 20px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #218838; }
        #loading { text-align: center; display: none; color: #007bff; font-weight: bold; margin-top: 15px; }
        .inbox { margin-top: 20px; }
        .msg-box {
            background: #f8f9fa;
            border-left: 5px solid #007bff;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .msg-sender { font-weight: bold; color: #333; }
        .msg-text { margin-top: 5px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>📡 Live OTP Fetcher</h2>
    
    <div class="input-group">
        <label>Enter Target Public Number (without +):</label>
        <input type="text" id="targetNumber" placeholder="e.g., 447123456789">
        <button onclick="fetchSMS()">Fetch Latest SMS</button>
    </div>

    <div id="loading">⏳ Data nikal raha hai, please wait...</div>

    <div class="inbox" id="smsContainer">
        </div>
</div>

<script>
    async function fetchSMS() {
        const number = document.getElementById('targetNumber').value.trim();
        const container = document.getElementById('smsContainer');
        const loading = document.getElementById('loading');
        
        if (!number) {
            alert("Bhai, pehle koi number toh daalo!");
            return;
        }

        // UI Updates
        container.innerHTML = "";
        loading.style.display = "block";

        try {
            // Yahan hum kisi public site (jaise receive-smss) ka URL target kar rahe hain
            const targetSiteUrl = `https://receive-smss.com/sms/${number}/`;
            
            // CORS bypass karne ke liye Free Proxy API ka use
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetSiteUrl)}`;

            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            // Target website ka pura HTML code humein mil gaya
            const htmlText = data.contents;

            // HTML ko parse karne ka tareeka (Browser ke andar hi)
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');

            // Ab HTML mein se data nikalna (Note: Target site ke class name ke hisaab se)
            // Example ke taur par main yahan generic row dhundh raha hu
            const messageRows = doc.querySelectorAll('.message-row'); 

            loading.style.display = "none";

            if (messageRows.length === 0) {
                container.innerHTML = `<div class="msg-box" style="border-left-color: red;">
                    Koi naya message nahi mila ya target website ne format change kar diya hai.
                </div>`;
                return;
            }

            // Har message ko UI mein dikhana
            messageRows.forEach(row => {
                // In classes ko target website ke hisaab se adjust karna padta hai
                const sender = row.querySelector('.sender-column')?.innerText || "Unknown";
                const text = row.querySelector('.message-text-column')?.innerText || "No text";
                
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg-box';
                msgDiv.innerHTML = `
                    <div class="msg-sender">From: ${sender}</div>
                    <div class="msg-text">${text}</div>
                `;
                container.appendChild(msgDiv);
            });

        } catch (error) {
            loading.style.display = "none";
            container.innerHTML = `<div class="msg-box" style="border-left-color: red;">
                Error: Data nikalne mein problem aayi. Target site ne block kar diya hoga.
            </div>`;
            console.error(error);
        }
    }
</script>

</body>
</html>
